<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 300px;
      padding: 15px;
      font-family: Arial, sans-serif;
    }
    .header {
      margin-bottom: 15px;
    }
    .title {
      font-size: 18px;
      font-weight: bold;
    }
    .subtitle {
      font-size: 12px;
      color: #666;
    }
    .info {
      background-color: #e3f2fd;
      border-left: 4px solid #2196f3;
      padding: 10px;
      margin: 10px 0;
    }
    .safe {
      background-color: #e8f5e9;
      border-left: 4px solid #4caf50;
      padding: 10px;
      margin: 10px 0;
    }
    .warning {
      background-color: #fff3e0;
      border-left: 4px solid #ff9800;
      padding: 10px;
      margin: 10px 0;
    }
    .danger {
      background-color: #ffebee;
      border-left: 4px solid #f44336;
      padding: 10px;
      margin: 10px 0;
    }
    button {
      background-color: #2196f3;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      width: 100%;
      font-size: 14px;
    }
    button:hover {
      background-color: #1976d2;
    }
    .footer {
      font-size: 11px;
      color: #999;
      text-align: center;
      margin-top: 15px;
    }
    .critical {
    background-color: #ffebee;
    color: #b71c1c;
    border-left: 4px solid #d32f2f;
    padding: 10px;
    margin: 10px 0;
    font-weight: bold;
}
  </style>
</head>
<body>
  <div class="header">
    <div class="title">ScEagle</div>
    <div class="subtitle">Eagle Scam Scanner</div>
  </div>
  
  <div id="domainInfo" class="info">
    Загрузка...
  </div>
  
  <div id="whoisResult"></div>
  
  <button id="checkBtn">Проверить домен</button>
  
  <div class="footer">
    v2.1 
  </div>
  <div class="footer">
    Мой Github: https://github.com/PUPOLIK
  </div>
  <script src="popup.js"></script>
</body>
</html>
